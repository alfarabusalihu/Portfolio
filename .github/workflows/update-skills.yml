name: Auto-Update Skills from CV

on:
  schedule:
    # Run at 00:00 on the 1st day of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual trigger button

jobs:
  update-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install # Install pdf-parse and others

      - name: Run AI Update Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GITHUB_PAT: ${{ secrets.NEXT_PUBLIC_GITHUB_ACTIONS_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node scripts/update-cv-data.js

      - name: Done
        run: echo "✅ Sync complete — data written to MongoDB"
